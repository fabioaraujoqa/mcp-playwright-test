name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Análise estática, segurança e formatação
  # ─────────────────────────────────────────────────────────────────────────────
  quality:
    name: Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      # Verifica vulnerabilidades conhecidas nas dependências
      - name: Auditoria de segurança (npm audit)
        run: npm audit --audit-level=high

      # Detecta segredos/tokens acidentalmente adicionados ao código
      - name: Verificar segredos no código (Secretlint)
        run: npm run secrets:check

      # Análise estática: erros, anti-padrões de segurança, regras do Playwright
      - name: Lint (ESLint)
        run: npm run lint

      # Garante formatação consistente sem alterar arquivos
      - name: Formatação (Prettier check)
        run: npm run format:check

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Testes Playwright (apenas Chromium em CI para velocidade)
  # ─────────────────────────────────────────────────────────────────────────────
  tests:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: quality # Só roda se o job de qualidade passar

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar browsers Playwright (somente Chromium em CI)
        run: npx playwright install chromium --with-deps

      - name: Executar testes
        run: npx playwright test --project=chromium
        env:
          CI: true
          # Variáveis de ambiente injetadas via GitHub Secrets
          # Configure em: Settings > Secrets and variables > Actions
          SISTEMA_BASE_URL: ${{ secrets.SISTEMA_BASE_URL }}
          SISTEMA_USER: ${{ secrets.SISTEMA_USER }}
          SISTEMA_PASSWORD: ${{ secrets.SISTEMA_PASSWORD }}
          HUB_BASE_URL: ${{ secrets.HUB_BASE_URL }}

      # Sempre publica o relatório, mesmo em falha
      - name: Upload relatório Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # Publica artefatos de falha (screenshots/traces) quando há erro
      - name: Upload artefatos de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-failure
          path: test-results/
          retention-days: 7
